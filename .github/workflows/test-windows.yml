name: Test AutoCD on Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Create test directory and files
      run: |
        mkdir test_dir
        cd test_dir
        
        # Create test_app.go
        Set-Content -Path "test_app.go" -Value @"
package main

import (
	"fmt"
	"os"
	autocd "../"
)

func main() {
	if len(os.Args) != 2 {
		fmt.Fprintf(os.Stderr, "Usage: %s <directory>\n", os.Args[0])
		fmt.Fprintf(os.Stderr, "Example: %s C:\\Windows\\Temp\n", os.Args[0])
		os.Exit(1)
	}

	targetDir := os.Args[1]
	
	fmt.Printf("Current directory: %s\n", getCurrentDir())
	fmt.Printf("Target directory: %s\n", targetDir)
	fmt.Printf("About to call ExitWithDirectory()...\n")
	
	// This should replace the process and never return
	if err := autocd.ExitWithDirectory(targetDir); err != nil {
		fmt.Printf("Error: %v\n", err)
		os.Exit(1)
	}
	
	// This should NEVER execute if process replacement works
	fmt.Printf("❌ BUG: Process was NOT replaced - this line should never be reached!\n")
	fmt.Printf("Still in directory: %s\n", getCurrentDir())
}

func getCurrentDir() string {
	wd, err := os.Getwd()
	if err != nil {
		return "unknown"
	}
	return wd
}
"@ -Encoding UTF8
        
        # Initialize Go module
        go mod init test-app
        
        # Create go.mod with local replace
        Set-Content -Path "go.mod" -Value @"
module test-app

go 1.21

replace autocd => ../

require autocd v0.0.0-00010101000000-000000000000
"@ -Encoding UTF8
        
        go mod tidy
      shell: powershell
    
    - name: Build test application
      run: |
        cd test_dir
        go build -o test_app.exe test_app.go
      shell: powershell
    
    - name: Test with valid directory
      run: |
        cd test_dir
        echo "=== TEST 1: Basic functionality ==="
        .\test_app.exe C:\Windows\Temp
      shell: powershell
      continue-on-error: true
    
    - name: Test with debug mode
      run: |
        cd test_dir
        echo "=== TEST 2: Debug mode ==="
        $env:AUTOCD_DEBUG = "1"
        .\test_app.exe C:\Windows\Temp
      shell: powershell
      continue-on-error: true
    
    - name: Test with current directory
      run: |
        cd test_dir
        echo "=== TEST 3: Current directory ==="
        .\test_app.exe .
      shell: powershell
      continue-on-error: true
    
    - name: Test with invalid directory
      run: |
        cd test_dir
        echo "=== TEST 4: Invalid directory (should show error) ==="
        .\test_app.exe C:\NonExistentDirectory12345
      shell: powershell
      continue-on-error: true
    
    - name: Show environment info
      run: |
        echo "=== ENVIRONMENT INFO ==="
        echo "PowerShell version: $($PSVersionTable.PSVersion)"
        echo "Available shells:"
        Get-Command cmd, powershell, pwsh -ErrorAction SilentlyContinue | Select-Object Name, Source
        echo "Environment variables:"
        echo "COMSPEC: $env:COMSPEC"
        echo "WINDIR: $env:WINDIR"
      shell: powershell